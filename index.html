<!DOCTYPE html>
<html>
<head>
    <title>UMBRELLA ADMIN</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "545e6d0a-cbe8-4b6e-82a6-7e43c5af32ac",
          serviceWorkerPath: "OneSignalSDKWorker.js",
          serviceWorkerParam: { scope: "/umbrella-notif/" }
        });
      });
    </script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:100px; font-family:sans-serif;">
    <h2>UMBRELLA ADMIN HUB</h2>
    <button onclick="OneSignal.Notifications.requestPermission()" style="padding:20px; border-radius:10px; background:#8e44ad; color:#fff; border:none; cursor:pointer; font-weight:bold;">
        AKTIFKAN NOTIFIKASI SEKARANG
    </button>
</body>
</html>
