<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Form Juri - Lomba Mancing Duo Hoki</title>
    <style>
        /* ===== SAMA SEPERTI SEBELUMNYA ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0f0a1a;
            color: #FFFFFF;
            padding: 12px;
            min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; padding-bottom: 30px; }
        .card {
            background: #1a1228;
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 12px;
            border: 1px solid #2d1f4a;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #1a1228;
            border-radius: 14px;
            border: 1px solid #2d1f4a;
            margin-bottom: 12px;
        }
        .header .logo { font-size: 18px; font-weight: 700; color: #c4b5e3; }
        .header .logo span { color: #FFFFFF; }
        .header .counter { font-size: 12px; color: #7c6a9e; }
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #c4b5e3;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .section-title .badge {
            font-size: 11px;
            font-weight: 400;
            color: #7c6a9e;
            background: #2d1f4a;
            padding: 2px 10px;
            border-radius: 12px;
        }
        .section-title .btn-back {
            background: #2d1f4a;
            color: #FFFFFF;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .section-title .btn-back:active { transform: scale(0.95); background: #3d2a5a; }
        .btn-reset {
            color: #ef4444;
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .btn-reset:active { color: #dc2626; transform: scale(0.95); }
        .info-box {
            background: #2d1f4a;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: #FFFFFF;
            margin-bottom: 10px;
        }
        .info-box.warning { background: #4a2f1a; color: #fbbf24; }
        .info-box.success { background: #064e3b; color: #6ee7b7; }
        .form-group { margin-bottom: 10px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 4px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #2d1f4a;
            border-radius: 10px;
            font-size: 15px;
            background: #0f0a1a;
            color: #FFFFFF;
            transition: border-color 0.2s;
        }
        input[type="text"]::placeholder { color: #4a3a6a; }
        input[type="text"]:focus { outline: none; border-color: #7c3aed; background: #1a1228; }
        input[type="number"] {
            flex: 1;
            min-width: 50px;
            padding: 6px 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 2px solid #2d1f4a;
            background: #0f0a1a;
            color: #FFFFFF;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
            appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"]::placeholder { color: #4a3a6a; }
        input[type="number"]:focus { outline: none; border-color: #7c3aed; background: #1a1228; }
        input[type="number"].editing { border-color: #f59e0b; background: #1a1228; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #7c3aed; color: white; }
        .btn-primary:active { background: #6d28d9; }
        .btn-success { background: #7c3aed; color: white; }
        .btn-success:active { background: #6d28d9; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:active { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: #1a1228; }
        .btn-warning:active { background: #d97706; }
        .btn-gacha {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            color: white;
            font-size: 18px;
            padding: 14px;
            margin-top: 6px;
        }
        .btn-gacha:active { transform: scale(0.97); }
        .btn-gacha.disabled { opacity: 0.4; pointer-events: none; }
        .btn-small {
            padding: 4px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #2d1f4a;
            color: #FFFFFF;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-small:active { transform: scale(0.95); }
        .btn-small.success { background: #7c3aed; color: white; }
        .btn-small.success:active { background: #6d28d9; }
        .btn-small.warning { background: #f59e0b; color: #1a1228; }
        .btn-small.warning:active { background: #d97706; }
        .btn-small.danger { background: #ef4444; color: white; }
        .btn-small.danger:active { background: #dc2626; }
        .flex-row { display: flex; gap: 8px; align-items: center; }
        .flex-row .btn { width: auto; }
        .flex-row input { flex: 1; }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2d1f4a;
            font-size: 14px;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item .delete-btn { color: #ef4444; cursor: pointer; font-size: 16px; padding: 0 4px; font-weight: 700; }
        .list-item .delete-btn:active { color: #dc2626; }
        .list-item .badge-new { background: #7c3aed; color: white; font-size: 9px; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }
        .tim-card {
            background: #0f0a1a;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            border: 1px solid #2d1f4a;
            transition: border-color 0.2s;
        }
        .tim-card.editing { border-color: #f59e0b; background: #1a1228; }
        .tim-card .tim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 14px;
        }
        .tim-card .tim-anggota { font-size: 12px; color: #7c6a9e; }
        .tim-card .tim-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .tim-card .tim-row .result-text {
            font-size: 14px;
            color: #c4b5e3;
            background: #1a1228;
            padding: 6px 10px;
            border-radius: 6px;
            flex: 1;
            min-width: 120px;
        }
        .tim-card .tim-row .result-text .label { color: #7c6a9e; }
        .tim-card .tim-row .result-text .value { font-weight: 700; }
        .tim-card .tim-row .result-text .value.selisih { color: #FFFFFF; }
        .hidden { display: none !important; }
        .empty-state { color: #4a3a6a; text-align: center; padding: 16px 0; font-size: 14px; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d1f4a;
            color: #FFFFFF;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            border: 1px solid #7c3aed;
            animation: slideUp 0.3s ease;
        }
        .toast.success { border-color: #7c3aed; color: #6ee7b7; }
        .toast.error { border-color: #ef4444; color: #fca5a5; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .pemenang { text-align: center; padding: 10px 0; }
        .pemenang .juara { font-size: 24px; font-weight: 800; color: #f59e0b; }
        .pemenang .juara-2 { font-size: 20px; font-weight: 700; color: #FFFFFF; margin-top: 8px; }
        .pemenang .detail { font-size: 13px; color: #7c6a9e; margin-top: 4px; }
        .pemenang .trophy { font-size: 48px; margin-bottom: 8px; }
        .pemenang .seri-text { font-size: 16px; color: #f59e0b; font-weight: 700; }
        .reset-footer {
            text-align: center;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #2d1f4a;
        }
        @media (max-width: 400px) {
            .header .logo { font-size: 15px; }
            .tim-card .tim-row input[type="number"] { min-width: 40px; font-size: 13px; padding: 4px 8px; }
            .section-title .btn-back { font-size: 11px; padding: 3px 8px; }
            .tim-card .tim-row .btn-small { font-size: 11px; padding: 4px 8px; }
            .tim-card .tim-row .result-text { font-size: 12px; padding: 4px 8px; min-width: 80px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">🎣 <span>Form Juri</span></div>
            <div class="counter" id="counterInfo">0 peserta</div>
        </div>

        <!-- STAGE 1: PENDAFTARAN -->
        <div class="card" id="stagePendaftaran">
            <div class="section-title">
                <span>📝 Daftar Peserta</span>
            </div>
            <div id="infoPendaftaran" class="info-box">Masukkan nama peserta. Klik GACHA PASANGAN saat semua sudah terdaftar.</div>
            <div class="form-group">
                <label for="inputNama">Nama Peserta</label>
                <div class="flex-row">
                    <input type="text" id="inputNama" placeholder="Masukkan nama">
                    <button class="btn btn-primary" onclick="tambahPeserta()" style="width:auto; padding:10px 16px;">Tambah</button>
                </div>
            </div>
            <div id="listPeserta"><div class="empty-state">Belum ada peserta</div></div>
            <button class="btn btn-gacha" id="btnGacha" onclick="gachaPairing()">🎰 GACHA PASANGAN</button>
        </div>

        <!-- STAGE 2: INPUT HASIL -->
        <div class="card hidden" id="stageInputHasil">
            <div class="section-title">
                <span>📊 Hasil Pancing</span>
                <span class="badge" id="timProgress">0/0 komplit</span>
            </div>
            <div id="infoPenjurian" class="info-box">Isi hasil pancing masing-masing tim. Bisa simpan 1 nilai dulu.</div>
            
            <div style="margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid #2d1f4a;">
                <div style="font-size:13px; font-weight:600; color:#FFFFFF; margin-bottom:6px;">➕ Peserta Tambahan</div>
                <div class="flex-row">
                    <input type="text" id="inputTelat" placeholder="Nama peserta tambahan">
                    <button class="btn btn-success" onclick="tambahTelat()" style="width:auto; padding:10px 16px;">Tambah</button>
                </div>
            </div>
            
            <div id="listTim"></div>
            
            <button class="btn btn-gacha" id="btnHitung" onclick="hitungHasil()" style="margin-top:10px;">📊 HITUNG HASIL</button>
            <div id="infoHitung" style="font-size:12px; color:#4a3a6a; margin-top:4px; text-align:center;"></div>
        </div>

        <!-- STAGE 3: PENILAIAN -->
        <div class="card hidden" id="stagePenilaian">
            <div class="section-title">
                <span>🏆 Hasil Akhir</span>
                <button class="btn-back" onclick="kembaliKeInputHasil()">⬅ Kembali</button>
            </div>
            <div id="pemenangContainer"></div>
            <div class="reset-footer">
                <button class="btn-reset" onclick="resetData()">🗑️ Reset Semua Data</button>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIG =====
        var API_URL = 'https://script.google.com/macros/s/AKfycbyDskJFdamlC5pAoyW8SfLTVCQ2MQNm_cz1g3sbvTfYeQW4es1TwpH3C1J5YhnWf146/exec';
        var MAX_TIM = 40;
        var pollingInterval = null;
        var nilaiSementara = {};
        var timElements = {};
        var focusedTimId = null;
        var lastTimData = null;
        var lastPesertaData = null;

        // ===== DOM REFS =====
        var $ = function(id) { return document.getElementById(id); };
        var counterInfo = $('counterInfo');
        var listPeserta = $('listPeserta');
        var listTim = $('listTim');
        var stagePendaftaran = $('stagePendaftaran');
        var stageInputHasil = $('stageInputHasil');
        var stagePenilaian = $('stagePenilaian');
        var btnGacha = $('btnGacha');
        var btnHitung = $('btnHitung');
        var inputNama = $('inputNama');
        var inputTelat = $('inputTelat');
        var timProgress = $('timProgress');
        var pemenangContainer = $('pemenangContainer');
        var infoPendaftaran = $('infoPendaftaran');
        var infoPenjurian = $('infoPenjurian');
        var infoHitung = $('infoHitung');

        // ===== TOAST =====
        function showToast(msg, type) {
            var old = document.querySelector('.toast');
            if (old) old.remove();
            var div = document.createElement('div');
            div.className = 'toast ' + (type || '');
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(function() { div.remove(); }, 3000);
        }

        // ===== TAMBAH PESERTA (OPTIMASI) =====
        async function tambahPeserta() {
            var nama = inputNama.value.trim();
            if (!nama) { showToast('Masukkan nama', 'error'); return; }
            
            // 🔥 CEK DUPLIKAT DI DOM (cepat)
            var existingItems = listPeserta.querySelectorAll('.list-item');
            for (var i = 0; i < existingItems.length; i++) {
                var text = existingItems[i].textContent.trim();
                if (text === nama || text.startsWith(nama + ' ')) {
                    showToast('Peserta sudah terdaftar', 'error');
                    return;
                }
            }
            
            // 🔥 TAMBAHKAN LANGSUNG KE DOM (tanpa nunggu server)
            var count = existingItems.length + 1;
            var escapedNama = nama.replace(/'/g, "\\'");
            
            var html = '<div class="list-item">';
            html += '<span>' + count + '. ' + nama + ' <span class="badge-new">Baru</span></span>';
            html += '<span class="delete-btn" onclick="hapusPeserta(\'' + escapedNama + '\')">✕</span>';
            html += '</div>';
            
            listPeserta.insertAdjacentHTML('afterbegin', html);
            
            // Update counter
            var pesertaCount = parseInt(counterInfo.textContent) || 0;
            counterInfo.textContent = (pesertaCount + 1) + ' peserta';
            
            inputNama.value = '';
            inputNama.focus();
            
            // 🔥 KIRIM KE GAS (background, tanpa nunggu)
            fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'tambahPeserta', nama: nama })
            }).then(function() {
                // 🔥 SYNC di background
                setTimeout(function() {
                    lastPesertaData = null;
                    loadData();
                }, 1500);
            }).catch(function() {
                showToast('Gagal menyimpan ke server', 'error');
                // Jika gagal, hapus dari DOM
                var items = listPeserta.querySelectorAll('.list-item');
                if (items.length > 0 && items[0].textContent.includes(nama)) {
                    items[0].remove();
                }
            });
        }

        // ===== UPDATE PESERTA (OPTIMASI - hanya jika berubah) =====
        function updatePeserta(peserta) {
            if (!peserta || peserta.length === 0) {
                listPeserta.innerHTML = '<div class="empty-state">Belum ada peserta</div>';
                lastPesertaData = null;
                return;
            }
            
            var current = JSON.stringify(peserta);
            if (current === lastPesertaData) return;
            lastPesertaData = current;
            
            var html = '';
            peserta.forEach(function(nama, i) {
                var escapedNama = nama.replace(/'/g, "\\'");
                var isNew = i === 0 ? '<span class="badge-new">Baru</span>' : '';
                html += '<div class="list-item">';
                html += '<span>' + (i+1) + '. ' + nama + ' ' + isNew + '</span>';
                html += '<span class="delete-btn" onclick="hapusPeserta(\'' + escapedNama + '\')">✕</span>';
                html += '</div>';
            });
            listPeserta.innerHTML = html;
        }

        // ===== BUILD 40 TIM =====
        function buildTimDOM() {
            var html = '';
            for (var i = 1; i <= MAX_TIM; i++) {
                html += `
                    <div class="tim-card" data-tim-id="${i}" style="display:none;">
                        <div class="tim-header">
                            <span>Tim #${i}</span>
                            <span class="tim-status" style="font-size:12px; color:#7c6a9e;">⏳ Belum</span>
                        </div>
                        <div class="tim-anggota">👥 <span class="tim-anggota-text">-</span></div>
                        <div class="tim-row tim-input-row">
                            <input type="number" id="besar_${i}" placeholder="Terbesar" step="any" data-tim-id="${i}" data-field="besar">
                            <input type="number" id="kecil_${i}" placeholder="Terkecil" step="any" data-tim-id="${i}" data-field="kecil">
                            <button class="btn-small success btn-action" data-tim-id="${i}" data-action="simpan">💾 Simpan</button>
                        </div>
                        <div class="tim-row tim-result-row" style="display:none;">
                            <span class="result-text">
                                <span class="label">Terbesar:</span> <span class="value terbesar-val">-</span> &nbsp;|&nbsp;
                                <span class="label">Terkecil:</span> <span class="value terkecil-val">-</span> &nbsp;|&nbsp;
                                <span class="label">Selisih:</span> <span class="value selisih-val">-</span>
                            </span>
                            <button class="btn-small warning btn-action" data-tim-id="${i}" data-action="koreksi">✏️ Koreksi</button>
                        </div>
                    </div>
                `;
            }
            listTim.innerHTML = html;
            
            for (var j = 1; j <= MAX_TIM; j++) {
                var card = document.querySelector('.tim-card[data-tim-id="' + j + '"]');
                timElements[j] = {
                    card: card,
                    status: card.querySelector('.tim-status'),
                    anggotaText: card.querySelector('.tim-anggota-text'),
                    besarInput: document.getElementById('besar_' + j),
                    kecilInput: document.getElementById('kecil_' + j),
                    terbesarVal: card.querySelector('.terbesar-val'),
                    terkecilVal: card.querySelector('.terkecil-val'),
                    selisihVal: card.querySelector('.selisih-val'),
                    inputRow: card.querySelector('.tim-input-row'),
                    resultRow: card.querySelector('.tim-result-row'),
                    actionBtn: card.querySelector('.tim-input-row .btn-action') || card.querySelector('.tim-result-row .btn-action'),
                };
            }
            
            listTim.addEventListener('focusin', function(e) {
                var target = e.target;
                if (target.tagName === 'INPUT' && target.type === 'number') {
                    var timId = parseInt(target.dataset.timId);
                    if (timId) focusedTimId = timId;
                }
            });
            
            listTim.addEventListener('focusout', function(e) {
                var target = e.target;
                if (target.tagName === 'INPUT' && target.type === 'number') {
                    var timId = parseInt(target.dataset.timId);
                    setTimeout(function() {
                        var activeElement = document.activeElement;
                        if (activeElement && activeElement.closest && timId) {
                            var isStillInSameTim = activeElement.closest('.tim-card[data-tim-id="' + timId + '"]');
                            if (!isStillInSameTim && focusedTimId === timId) {
                                var el = timElements[timId];
                                if (el && el.card.classList.contains('editing')) {
                                    focusedTimId = null;
                                    el.card.classList.remove('editing');
                                    lastTimData = null;
                                    loadData();
                                }
                            }
                        }
                    }, 300);
                }
            });
        }

        // ===== UPDATE TIM =====
        function updateTimData(timData) {
            var activeCount = 0;
            var completeCount = 0;
            
            for (var i = 1; i <= MAX_TIM; i++) {
                var el = timElements[i];
                if (!el) continue;
                
                var data = timData.find(function(t) { return t.id === i; });
                
                if (data && data.aktif) {
                    activeCount++;
                    el.card.style.display = 'block';
                    
                    var anggotaText = data.anggota ? data.anggota.join(' & ') : '-';
                    el.anggotaText.textContent = anggotaText;
                    
                    var hasBesar = (data.terbesar !== null && data.terbesar !== '');
                    var hasKecil = (data.terkecil !== null && data.terkecil !== '');
                    var isComplete = hasBesar && hasKecil;
                    var isEditing = (focusedTimId === i && el.card.classList.contains('editing'));
                    
                    if (isComplete) {
                        el.status.textContent = '✅ Selesai';
                        el.status.style.color = '#6ee7b7';
                    } else if (hasBesar || hasKecil) {
                        el.status.textContent = '⏳ Sebagian';
                        el.status.style.color = '#fbbf24';
                    } else {
                        el.status.textContent = '⏳ Belum';
                        el.status.style.color = '#7c6a9e';
                    }
                    
                    if (isComplete && !isEditing) {
                        el.inputRow.style.display = 'none';
                        el.resultRow.style.display = 'flex';
                        el.terbesarVal.textContent = data.terbesar;
                        el.terkecilVal.textContent = data.terkecil;
                        el.selisihVal.textContent = data.selisih || (data.terbesar - data.terkecil);
                        completeCount++;
                    } else {
                        el.inputRow.style.display = 'flex';
                        el.resultRow.style.display = 'none';
                        
                        if (focusedTimId !== i) {
                            el.besarInput.value = (data.terbesar !== null && data.terbesar !== '') ? data.terbesar : (nilaiSementara['besar_' + i] || '');
                            el.kecilInput.value = (data.terkecil !== null && data.terkecil !== '') ? data.terkecil : (nilaiSementara['kecil_' + i] || '');
                        }
                        
                        var btn = el.inputRow.querySelector('.btn-action');
                        if (btn) {
                            if (isEditing) {
                                btn.textContent = '💾 Update';
                                btn.className = 'btn-small success btn-action';
                                btn.dataset.action = 'update';
                            } else {
                                btn.textContent = '💾 Simpan';
                                btn.className = 'btn-small success btn-action';
                                btn.dataset.action = 'simpan';
                            }
                        }
                    }
                } else {
                    el.card.style.display = 'none';
                    el.inputRow.style.display = 'flex';
                    el.resultRow.style.display = 'none';
                    el.besarInput.value = '';
                    el.kecilInput.value = '';
                }
            }
            
            timProgress.textContent = completeCount + '/' + activeCount + ' komplit';
            
            if (activeCount > 0 && completeCount === activeCount) {
                btnHitung.disabled = false;
                btnHitung.classList.remove('disabled');
                infoHitung.textContent = '✅ Semua tim komplit. Klik tombol untuk melihat hasil.';
                infoHitung.style.color = '#6ee7b7';
            } else {
                btnHitung.disabled = true;
                btnHitung.classList.add('disabled');
                infoHitung.textContent = '⏳ ' + (activeCount - completeCount) + ' tim belum komplit.';
                infoHitung.style.color = '#4a3a6a';
            }
            
            return { activeCount: activeCount, completeCount: completeCount };
        }

        // ===== LOAD DATA =====
        async function loadData() {
            try {
                var res = await fetch(API_URL + '?action=getData');
                var result = await res.json();
                if (result.status === 'success') {
                    renderData(result.data);
                }
            } catch(e) {}
        }

        // ===== RENDER =====
        function renderData(data) {
            var pesertaCount = data.peserta ? data.peserta.length : 0;
            counterInfo.textContent = pesertaCount + ' peserta';
            
            if (data.status === 'pendaftaran') {
                stagePendaftaran.classList.remove('hidden');
                stageInputHasil.classList.add('hidden');
                stagePenilaian.classList.add('hidden');
                btnGacha.disabled = false;
                btnGacha.classList.remove('disabled');
                infoPendaftaran.className = 'info-box';
                infoPendaftaran.innerHTML = 'Masukkan nama peserta. Klik GACHA PASANGAN saat semua sudah terdaftar.';
                // 🔥 UPDATE PESERTA (optimasi)
                updatePeserta(data.peserta || []);
            } else if (data.status === 'penjurian') {
                stagePendaftaran.classList.add('hidden');
                stageInputHasil.classList.remove('hidden');
                stagePenilaian.classList.add('hidden');
                
                updateTimData(data.tim || []);
                
                var hasAdmin = false;
                var tims = data.tim || [];
                for (var j = 0; j < tims.length; j++) {
                    if (tims[j].aktif && tims[j].anggota && tims[j].anggota.indexOf('Admin') !== -1) {
                        hasAdmin = true;
                        break;
                    }
                }
                if (hasAdmin) {
                    infoPenjurian.className = 'info-box warning';
                    infoPenjurian.innerHTML = '⚠️ Ada peserta yang belum memiliki pasangan.';
                } else {
                    infoPenjurian.className = 'info-box success';
                    infoPenjurian.innerHTML = '✅ Semua peserta sudah memiliki pasangan.';
                }
            } else if (data.status === 'selesai') {
                stagePendaftaran.classList.add('hidden');
                stageInputHasil.classList.add('hidden');
                stagePenilaian.classList.remove('hidden');
                renderPemenang(data.tim || []);
            }
        }

        // ===== RENDER PEMENANG =====
        function renderPemenang(tim) {
            if (!tim || tim.length === 0) {
                pemenangContainer.innerHTML = '<div class="empty-state">Belum ada data</div>';
                return;
            }
            var valid = tim.filter(function(t) { 
                return t.aktif && t.terbesar !== null && t.terkecil !== null && t.selisih !== null;
            });
            if (valid.length === 0) {
                pemenangContainer.innerHTML = '<div class="empty-state">Belum ada data lengkap</div>';
                return;
            }
            valid.sort(function(a, b) { 
                if (b.selisih !== a.selisih) return b.selisih - a.selisih;
                return a.terkecil - b.terkecil;
            });
            
            var groups = [];
            var currentGroup = null;
            valid.forEach(function(t) {
                if (!currentGroup) {
                    currentGroup = { selisih: t.selisih, terkecil: t.terkecil, tims: [t] };
                } else if (t.selisih === currentGroup.selisih && t.terkecil === currentGroup.terkecil) {
                    currentGroup.tims.push(t);
                } else {
                    groups.push(currentGroup);
                    currentGroup = { selisih: t.selisih, terkecil: t.terkecil, tims: [t] };
                }
            });
            if (currentGroup) groups.push(currentGroup);
            
            var isSeriJuara1 = false, isSeriJuara2 = false;
            var juara1Group = null, juara2Group = null;
            if (groups.length >= 1) {
                var g1 = groups[0];
                if (g1.tims.length > 1) {
                    isSeriJuara1 = true;
                } else {
                    juara1Group = g1;
                    if (groups.length >= 2) {
                        var g2 = groups[1];
                        if (g2.tims.length > 1) {
                            isSeriJuara2 = true;
                            juara2Group = g2;
                        } else {
                            juara2Group = g2;
                        }
                    }
                }
            }
            
            var html = '<div class="pemenang">';
            if (isSeriJuara1) {
                html += '<div class="trophy">⚖️</div>';
                html += '<div class="seri-text">HASIL SERI</div>';
                html += '<div class="detail">Tidak ada Juara 1 & 2 karena SERI di posisi teratas</div>';
                html += '<div style="margin-top:8px; font-size:14px; color:#FFFFFF;">Tim dengan data sama:</div>';
                groups[0].tims.forEach(function(t) {
                    html += '<div style="font-size:16px; font-weight:600; margin:4px 0;">' + (t.anggota ? t.anggota.join(' & ') : '') + '</div>';
                });
                html += '<div class="detail">Selisih: ' + groups[0].selisih + ' | Terkecil: ' + groups[0].terkecil + '</div>';
            } else {
                if (juara1Group) {
                    html += '<div class="trophy">🏆</div>';
                    html += '<div class="juara">🥇 Juara 1</div>';
                    juara1Group.tims.forEach(function(t) {
                        html += '<div style="font-size:20px; font-weight:700; margin:4px 0;">' + (t.anggota ? t.anggota.join(' & ') : '') + '</div>';
                        html += '<div class="detail">Terbesar: ' + t.terbesar + ' | Terkecil: ' + t.terkecil + '</div>';
                        html += '<div class="detail" style="font-weight:700; color:#FFFFFF; font-size:18px;">Selisih: ' + t.selisih + '</div>';
                    });
                }
                if (juara2Group) {
                    html += '<div style="margin-top:16px; padding-top:16px; border-top:1px solid #2d1f4a;">';
                    if (isSeriJuara2) {
                        html += '<div class="juara-2">🥈 Juara 2 (SERI)</div>';
                        html += '<div class="detail">⚖️ SERI antara ' + juara2Group.tims.length + ' tim</div>';
                    } else {
                        html += '<div class="juara-2">🥈 Juara 2</div>';
                    }
                    juara2Group.tims.forEach(function(t) {
                        html += '<div style="font-size:18px; font-weight:600; margin:4px 0;">' + (t.anggota ? t.anggota.join(' & ') : '') + '</div>';
                        html += '<div class="detail">Terbesar: ' + t.terbesar + ' | Terkecil: ' + t.terkecil + '</div>';
                        html += '<div class="detail" style="font-weight:600; color:#FFFFFF;">Selisih: ' + t.selisih + '</div>';
                    });
                    html += '</div>';
                }
            }
            html += '<div style="margin-top:16px; padding-top:16px; border-top:1px solid #2d1f4a; text-align:left;">';
            html += '<div style="font-weight:600; font-size:14px; color:#FFFFFF; margin-bottom:8px;">📊 Semua Tim</div>';
            groups.forEach(function(group, idx) {
                var isSeri = group.tims.length > 1;
                var label = '';
                if (isSeriJuara1) label = '⚖️ SERI';
                else if (idx === 0) label = '🥇 Juara 1';
                else if (idx === 1) label = isSeri ? '🥈⚖️ Juara 2 (SERI)' : '🥈 Juara 2';
                else label = (idx + 1) + '. Peringkat';
                html += '<div style="padding:6px 0; border-bottom:1px solid #2d1f4a; font-size:13px;">';
                html += '<div style="display:flex; justify-content:space-between; color:#c4b5e3;">';
                html += '<span>' + label + '</span>';
                html += '<span style="color:#7c6a9e;">Selisih: ' + group.selisih + ' | Terkecil: ' + group.terkecil + '</span>';
                html += '</div>';
                group.tims.forEach(function(t) {
                    html += '<div style="color:#7c6a9e; font-size:12px; padding-left:12px;">';
                    html += '👥 ' + (t.anggota ? t.anggota.join(' & ') : '');
                    html += ' | ' + t.terbesar + ' - ' + t.terkecil;
                    html += '</div>';
                });
                html += '</div>';
            });
            html += '</div></div>';
            pemenangContainer.innerHTML = html;
        }

        // ===== INPUT HANDLER =====
        function onInputChange(key, value) {
            nilaiSementara[key] = value;
        }

        // ===== EVENT DELEGATION =====
        document.addEventListener('click', function(e) {
            var target = e.target.closest('.btn-action');
            if (target) {
                var timId = parseInt(target.dataset.timId);
                var action = target.dataset.action;
                if (timId) {
                    if (action === 'koreksi') {
                        editTim(timId);
                    } else {
                        simpanHasil(timId);
                    }
                }
                e.preventDefault();
                return;
            }
        });

        // ===== EDIT TIM =====
        function editTim(timId) {
            var el = timElements[timId];
            if (!el) {
                showToast('Tim tidak ditemukan', 'error');
                return;
            }
            
            var besarVal = el.terbesarVal ? el.terbesarVal.textContent : '';
            var kecilVal = el.terkecilVal ? el.terkecilVal.textContent : '';
            
            if (besarVal === '-' || besarVal === '') {
                showToast('Tim belum diisi', '');
                return;
            }
            
            el.resultRow.style.display = 'none';
            el.inputRow.style.display = 'flex';
            
            el.besarInput.value = besarVal;
            el.kecilInput.value = kecilVal;
            nilaiSementara['besar_' + timId] = besarVal;
            nilaiSementara['kecil_' + timId] = kecilVal;
            
            var btn = el.inputRow.querySelector('.btn-action');
            if (btn) {
                btn.textContent = '💾 Update';
                btn.className = 'btn-small success btn-action';
                btn.dataset.action = 'update';
            }
            
            el.besarInput.focus();
            el.besarInput.select();
            el.besarInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            focusedTimId = timId;
            el.card.classList.add('editing');
        }

        // ===== SIMPAN HASIL =====
        async function simpanHasil(timId) {
            var el = timElements[timId];
            if (!el) {
                showToast('Tim tidak ditemukan', 'error');
                return;
            }
            
            var terbesar = el.besarInput.value.trim() !== '' ? parseFloat(el.besarInput.value) : null;
            var terkecil = el.kecilInput.value.trim() !== '' ? parseFloat(el.kecilInput.value) : null;
            
            if (terbesar === null && terkecil === null) {
                showToast('Isi minimal 1 nilai', 'error');
                return;
            }
            
            if (terbesar !== null && terkecil !== null && terbesar <= terkecil) {
                showToast('Terbesar harus > terkecil', 'error');
                return;
            }
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'inputHasil', 
                        timId: timId, 
                        terbesar: terbesar, 
                        terkecil: terkecil 
                    })
                });
                
                delete nilaiSementara['besar_' + timId];
                delete nilaiSementara['kecil_' + timId];
                
                focusedTimId = null;
                el.card.classList.remove('editing');
                
                showToast('✅ Data tersimpan', 'success');
                
                setTimeout(function() {
                    lastTimData = null;
                    loadData();
                }, 1500);
                
            } catch(e) {
                showToast('Gagal menyimpan', 'error');
            }
        }

        // ===== ACTIONS LAIN =====
        async function hapusPeserta(nama) {
            if (!confirm('Hapus "' + nama + '"?')) return;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'hapusPeserta', nama: nama })
                });
                lastPesertaData = null;
                setTimeout(loadData, 500);
            } catch(e) { showToast('Error', 'error'); }
        }

        async function tambahTelat() {
            var nama = inputTelat.value.trim();
            if (!nama) { showToast('Masukkan nama', 'error'); return; }
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'pesertaTelat', nama: nama })
                });
                inputTelat.value = '';
                lastTimData = null;
                setTimeout(loadData, 1500);
            } catch(e) { showToast('Error', 'error'); }
        }

        async function gachaPairing() {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'gachaPairing' })
                });
                nilaiSementara = {};
                lastTimData = null;
                setTimeout(loadData, 1500);
            } catch(e) { showToast('Error', 'error'); }
        }

        async function hitungHasil() {
            try {
                var res = await fetch(API_URL + '?action=getData');
                var result = await res.json();
                if (result.status !== 'success') {
                    showToast('Gagal mengambil data', 'error');
                    return;
                }
                var data = result.data;
                var tims = data.tim || [];
                var semuaTerisi = true;
                var adaAktif = false;
                for (var i = 0; i < tims.length; i++) {
                    if (tims[i].aktif) {
                        adaAktif = true;
                        if (tims[i].terbesar === null || tims[i].terkecil === null) {
                            semuaTerisi = false;
                            break;
                        }
                    }
                }
                if (!semuaTerisi || !adaAktif) {
                    showToast('Masih ada tim yang belum komplit!', 'error');
                    return;
                }
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'selesai' })
                });
                setTimeout(loadData, 500);
            } catch(e) { showToast('Error', 'error'); }
        }

        async function kembaliKeInputHasil() {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'kembaliKePenilaian' })
                });
                setTimeout(loadData, 500);
            } catch(e) { showToast('Error', 'error'); }
        }

        async function resetData() {
            if (!confirm('⚠️ Reset semua data? Ini akan menghapus semua peserta, tim, dan hasil. Tidak bisa dibatalkan!')) return;
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'reset' })
                });
                nilaiSementara = {};
                focusedTimId = null;
                lastTimData = null;
                lastPesertaData = null;
                showToast('🔄 Data direset', 'success');
                setTimeout(loadData, 500);
            } catch(e) {
                showToast('Gagal reset data', 'error');
            }
        }

        // ===== KEYBOARD =====
        inputNama.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); tambahPeserta(); }
        });
        inputTelat.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); tambahTelat(); }
        });

        // ===== INIT =====
        buildTimDOM();
        loadData();
        pollingInterval = setInterval(loadData, 3000);
    </script>
</body>
</html>
